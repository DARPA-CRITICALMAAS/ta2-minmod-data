name: Run Python Script on Pull Request

on:
  pull_request:
    branches:
      - main  # change this to your main branch

jobs:
  run_python_script:
    runs-on: ubuntu-latest

    steps:

      - name: Checkout repository Data
        uses: actions/checkout@v3
        with:
          path: ta2-minmod-data

      - name: Checkout repository
        uses: actions/checkout@v3
        with:
          repository: DARPA-CRITICALMAAS/ta2-minmod-kg
          ref: git-lfs-downnload-2
          path: ta2-minmod-kg

      - name: Print directory
        run:  |
          pwd
          ls

#      - name: Set up Python
#        uses: actions/setup-python@v2
#        with:
#          python-version: 3.8  # change this to your desired Python version
#
#      - name: Install dependencies
#        run: |
#          python -m pip install --upgrade pip
#          pip install -r validators/requirements.txt  # change this if you have dependencies
#
      - name: Install tj-actions
        uses: tj-actions/changed-files@v43

      - name: List all changed files
        uses: tj-actions/changed-files@v43
        env:
          ALL_CHANGED_FILES: ${{ steps.changed-files.outputs.all_changed_files }}
        run: |
          echo ${{ steps.changed-files.outputs.all_changed_files }}
          echo ${{ steps.changed-files.outputs }}
          echo ${{ steps.changed-files }}
          for file in ${ALL_CHANGED_FILES}; do
            echo "$file was changed"
          done

      - id: files
        with:
          path: ta2-minmod-data
          since_last_remote_commit: false
        env:
          ALL_CHANGED_FILES: ${{ steps.changed-files.outputs.all_changed_files }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - run: |
          pwd
          ls
          echo ${ALL_CHANGED_FILES}
          for changed_file in ${ALL_CHANGED_FILES}; do
            TEMP_FILE=$(mktemp)
            echo $changed_file
            echo $TEMP_FILE
          done

