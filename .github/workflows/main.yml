name: Run Python Script on Pull Request

on:
  pull_request:
    branches:
      - main  # change this to your main branch

jobs:
  run_python_script:
    runs-on: ubuntu-latest

    steps:

      - name: Checkout repository Data
        uses: actions/checkout@v3
        with:
          path: ta2-minmod-data

      - name: Checkout repository
        uses: actions/checkout@v3
        with:
          repository: DARPA-CRITICALMAAS/ta2-minmod-kg
          ref: git-lfs-downnload-2
          path: ta2-minmod-kg

      - name: Print directory
        run:  |
          pwd
          ls

#      - name: Set up Python
#        uses: actions/setup-python@v2
#        with:
#          python-version: 3.8  # change this to your desired Python version
#
#      - name: Install dependencies
#        run: |
#          python -m pip install --upgrade pip
#          pip install -r validators/requirements.txt  # change this if you have dependencies
#
      - name: Install jitterbit
        uses: jitterbit/get-changed-files@v1
        with:
          format: 'space-delimited'

      - id: files
        uses: jitterbit/get-changed-files@v1
      - run: |
          pwd
          ls
          for changed_file in ${{ steps.files.outputs.all }}; do
            echo $my_variable
            TEMP_FILE=$(mktemp)
            echo $changed_file
            echo $TEMP_FILE
          done
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          path: ta2-minmod-data